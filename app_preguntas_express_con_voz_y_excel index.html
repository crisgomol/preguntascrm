<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
   PREGUNTAS EXPRESS
</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1a2149,#2f61df);
  color:#333;
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h1{text-align:center}
textarea{
  width:100%;
  height:100px;
  border-radius:10px;
  padding:10px;
  border:1px solid #ccc;
}
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.mic{background:#ff4b5c;color:white}
.save{background:#28a745;color:white}
.export{background:#007bff;color:white}
input{margin-top:10px}
.table{
  margin-top:20px;
  width:100%;
  border-collapse:collapse;
}
.table th,.table td{
  border:1px solid #ccc;
  padding:8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Por favor envienme los objetivos de los 4 bots de total play que estan en el CRM</h1>

    <textarea id="respuesta" placeholder="Tu respuesta aparecerá aquí..."></textarea>

    <button class="mic" onclick="iniciarVoz()">🎤 Hablar</button>
    <button class="save" onclick="guardar()">Guardar</button>

    <br>
    <input type="file" id="excelFile">
    <button onclick="leerExcel()">Cargar Excel</button>

    <button class="export" onclick="exportarExcel()">Exportar Excel</button>

    <table class="table" id="tabla">
      <thead>
        <tr><th>Respuesta</th><th>Fecha</th></tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>
</div>

<script>
let datos=[];

// VOZ
function iniciarVoz(){
  const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'es-ES';
  recognition.start();

  recognition.onresult = function(event){
    document.getElementById('respuesta').value = event.results[0][0].transcript;
  }
}

// GUARDAR
function guardar(){
  let texto=document.getElementById('respuesta').value;
  if(!texto) return alert('Escribe o habla primero');

  let obj={
    respuesta:texto,
    fecha:new Date().toLocaleString()
  };

  datos.push(obj);
  actualizarTabla();
  document.getElementById('respuesta').value="";
}

// TABLA
function actualizarTabla(){
  let tbody=document.querySelector('#tabla tbody');
  tbody.innerHTML="";

  datos.forEach(d=>{
    let fila=`<tr><td>${d.respuesta}</td><td>${d.fecha}</td></tr>`;
    tbody.innerHTML+=fila;
  });
}

// EXPORTAR
function exportarExcel(){
  let ws=XLSX.utils.json_to_sheet(datos);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Respuestas");
  XLSX.writeFile(wb,"respuestas.xlsx");
}

// IMPORTAR
function leerExcel(){
  let file=document.getElementById('excelFile').files[0];
  let reader=new FileReader();

  reader.onload=function(e){
    let data=new Uint8Array(e.target.result);
    let workbook=XLSX.read(data,{type:'array'});
    let sheet=workbook.Sheets[workbook.SheetNames[0]];
    let json=XLSX.utils.sheet_to_json(sheet);
    datos=json;
    actualizarTabla();
  }

  reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
